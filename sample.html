<div id="sidebar">
  <div >
    <label for="lng">경도</label>
    <input id="lng" type="number" step="0.0001">
  </div>
  <div >
    <label for="lat">위도</label>
    <input id="lat" type="number" step="0.0001">
  </div>
   <div >
      <label for="nameLabel">이름</label>
      <input id="nameLabel" type="text" value="">
    </div>

  <div >
    <label for="shape">객체</label>
    <select id="shape">
      <option value="box">장애물</option>
      <option value="sphere1">사람(적)</option>
      <option value="sphere2">사람(아군)</option>
      <option value="sphere3">사람(민간인)</option>
      <option value="billboard1">UGV(적)</option>
      <option value="billboard2">UGV(아군)</option>
      <option value="billboard3">대대(아군)</option>
    </select>
  </div>

  <!-- 박스 전용 입력 필드 -->
  <div id="boxFields" style="display:block;">
    <div >
      <label for="boxWidth">가로</label>
      <input id="boxWidth" type="number" value="50">
    </div>
    <div >
      <label for="boxDepth">세로</label>
      <input id="boxDepth" type="number" value="50">
    </div>
    <div >
      <label for="boxHeight">높이</label>
      <input id="boxHeight" type="number" value="50">
    </div>
       
  </div>

  <div  style="display:block;">
    <div>
    <button id="addBtn">등록</button>
    <button id="deleteBtn">객체 삭제</button>
    <button id="deleteAllBtn">전체 삭제</button>
  </div>
  <div>
    <button id="saveFileBtn">파일로 저장</button>
    <button id="loadFileBtn">파일 불러오기</button>
  </div>
  <input type="file" id="fileInput" style="display:none" />
</div>



<div style="margin:8px 0; display:block;">
  <div>
  <label>경도(lon): <input type="number" id="lonInput" step="0.00001" placeholder="127.00000"></label>
  </div>
  <div>
  <label>위도(lat): <input type="number" id="latInput" step="0.00001" placeholder="37.30000"></label>
  </div>
  <div>
  <label>이동시간(sec): <input type="number" id="durationInput" step="0.1" value="5"></label>
  </div>
  <button id="addWaypointBtn">좌표 입력</button>
  <button id="startMoveBtn">이동 실행</button>
</div>


</div>
