          function openSymbolPopup() {
            // window.open("symbol", "symbolPopup", "width=300,height=400");
            var sym = document.getElementById("Sym")
            if(sym.style.display == "block")
            {
              sym.style.display = "none";
            }
            else
            {
              sym.style.display = "block";
            }
          }

          const symbols = [
              { name: "친군군", sidc: "SFZ*-----------" },
            ];

            const list = document.getElementById("symbolList");


            symbols.forEach(item => {
              const symbol = new ms.Symbol(item.sidc, { size: 50 });
              const url = symbol.asSVG();

              const div = document.createElement("div");
              div.className = "symbolItem";
              div.draggable = true;
              div.classList.add('symbol');
              div.innerHTML = url;
              // div.innerHTML += "<div>${item.name}</div>";

              div.addEventListener("dragstart", (e) => {
                e.dataTransfer.setData("text/plain", item.sidc);
              });

              list.appendChild(div);
            });



            $('#layerTree').jstree({

                "plugins" : [ "wholerow" ],

                'core' : { 'data' : {
                  "url": function (node) {
                        return "data1/alldata.json"; 
                    }
                  } 
                },
                "check_callback": true, 

            });

            $('#layerTree').bind('select_node.jstree', function(event, data) {
                // 노드를 선택했을 때 실행될 코드 작성
                var selectedNodeId = data.instance.get_node(data.selected).id;
                var selectedNode = data.instance.get_node(data.selected).data;

                console.log('선택된 노드 ID:', selectedNodeId);
                console.log('선택된 노드 데이터:', selectedNode);
                const indc = document.getElementById("sympo2").value;

                var itemCode = "S" + indc.toString() + selectedNode.toString().substr(2,13);

                const list = document.getElementById("symbolList");
                if(list.children.length > 0)
                {
                  list.children[0].remove();
                }

                const symbol = new ms.Symbol(itemCode, { size: 50 });
                const url = symbol.asSVG();

                const div = document.createElement("div");
                div.className = "symbolItem";
                div.draggable = true;
                div.classList.add('symbol');
                div.innerHTML = url;
                // div.innerHTML += "<div>${item.name}</div>";

                div.addEventListener("dragstart", (e) => {
                  e.dataTransfer.setData("text/plain", itemCode);
                });

                list.appendChild(div)

            });
